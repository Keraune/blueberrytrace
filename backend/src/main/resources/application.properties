spring.application.name=vlv-blueberry-system

# =========================================
# MYSQL
# =========================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vlv_blueberry_system?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345678}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =========================================
# SERVER
# =========================================
server.port=${SERVER_PORT:8080}

# =========================================
# CORS
# =========================================
blueberrytrace.api.cors.allowed-origins=http://localhost:5173,http://localhost:3000
