<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camas</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>

<body class="app-body">
    <div class="app-shell">
        <div th:replace="~{fragments/app-shell :: sidebar('camas')}"></div>

        <main class="main-content">
            <div
                th:replace="~{fragments/app-shell :: topbar('Gestión de camas', 'Registro, edición y asignación de camas por invernadero')}">
            </div>

            <div class="lote-alert success" th:if="${successMessage}" th:text="${successMessage}"></div>

            <section class="dashboard-grid bottom-grid lotes-layout">
                <article class="panel-card lotes-main-card">
                    <div class="panel-head">
                        <div>
                            <h3>Listado de camas</h3>
                            <span
                                th:text="${#lists.isEmpty(camas) ? 'Aún no hay camas registradas' : 'Total registradas: ' + #lists.size(camas)}">Vista
                                actual</span>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="custom-table">
                            <thead>
                                <tr>
                                    <th>Código</th>
                                    <th>Invernadero</th>
                                    <th>Descripción</th>
                                    <th>Capacidad</th>
                                    <th>Estado</th>
                                    <th>Registrado por</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(camas)}">
                                    <td colspan="7">No hay camas registradas todavía.</td>
                                </tr>
                                <tr th:each="cama : ${camas}">
                                    <td th:text="${cama.codigo}">CAM-001</td>
                                    <td
                                        th:text="${cama.lote != null ? cama.lote.codigo + ' - ' + cama.lote.cultivo : '-'}">
                                        LOT-001</td>
                                    <td th:text="${cama.descripcion}">Cama sector 1</td>
                                    <td th:text="${cama.capacidadReferencial}">1200</td>
                                    <td>
                                        <span class="badge" th:text="${cama.estado}"
                                            th:classappend="${cama.estado == 'ACTIVA'} ? ' success' : (${cama.estado == 'MANTENIMIENTO'} ? ' warning' : ' neutral')">
                                            ACTIVA
                                        </span>
                                    </td>
                                    <td th:text="${cama.usuarioRegistro != null ? cama.usuarioRegistro.username : '-'}">
                                        admin</td>
                                    <td>
                                        <div class="table-actions">
                                            <a th:href="@{/camas(edit=${cama.id})}" class="table-link">Editar</a>
                                            <form th:action="@{/camas/{id}/estado(id=${cama.id})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}"
                                                    th:value="${_csrf.token}">
                                                <button class="table-action-btn" type="submit"
                                                    th:text="${cama.estado == 'ACTIVA'} ? 'Desactivar' : 'Activar'">
                                                    Cambiar estado
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </article>

                <article class="panel-card">
                    <div class="panel-head">
                        <h3>Nueva cama</h3>
                        <span>Formulario</span>
                    </div>

                    <form class="form-grid" th:action="@{/camas}" th:object="${camaForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="form-group">
                            <label for="codigo">Código</label>
                            <input id="codigo" type="text" th:field="*{codigo}" placeholder="CAM-001">
                            <small class="field-error" th:if="${#fields.hasErrors('codigo')}"
                                th:errors="*{codigo}"></small>
                        </div>

                        <div class="form-group">
                            <label for="capacidadReferencial">Capacidad referencial</label>
                            <input id="capacidadReferencial" type="number" th:field="*{capacidadReferencial}"
                                placeholder="1200">
                            <small class="field-error" th:if="${#fields.hasErrors('capacidadReferencial')}"
                                th:errors="*{capacidadReferencial}"></small>
                        </div>

                        <div class="form-group full-span">
                            <label for="descripcion">Descripción</label>
                            <input id="descripcion" type="text" th:field="*{descripcion}"
                                placeholder="Descripción de la cama">
                            <small class="field-error" th:if="${#fields.hasErrors('descripcion')}"
                                th:errors="*{descripcion}"></small>
                        </div>

                        <div class="form-group">
                            <label for="loteId">Invernadero asociado</label>
                            <select id="loteId" th:field="*{loteId}">
                                <option value="">Seleccione un invernadero</option>
                                <option th:each="lote : ${lotes}" th:value="${lote.id}"
                                    th:text="${lote.codigo + ' - ' + lote.cultivo + ' / ' + lote.variedad}"></option>
                            </select>
                            <small class="field-error" th:if="${#fields.hasErrors('loteId')}"
                                th:errors="*{loteId}"></small>
                        </div>

                        <div class="form-group">
                            <label for="estado">Estado</label>
                            <select id="estado" th:field="*{estado}">
                                <option th:each="estado : ${estadosDisponibles}" th:value="${estado}"
                                    th:text="${estado}"></option>
                            </select>
                            <small class="field-error" th:if="${#fields.hasErrors('estado')}"
                                th:errors="*{estado}"></small>
                        </div>

                        <button class="primary-btn full-width full-span" type="submit">Guardar cama</button>
                    </form>
                </article>

                <article class="panel-card" th:if="${editId != null and camaEditForm != null}">
                    <div class="panel-head">
                        <h3>Editar cama</h3>
                        <span th:text="${'ID: ' + editId}">Edición</span>
                    </div>

                    <form class="form-grid" th:action="@{/camas/{id}/editar(id=${editId})}" th:object="${camaEditForm}"
                        method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="form-group">
                            <label for="editCodigo">Código</label>
                            <input id="editCodigo" type="text" th:field="*{codigo}">
                            <small class="field-error" th:if="${#fields.hasErrors('codigo')}"
                                th:errors="*{codigo}"></small>
                        </div>

                        <div class="form-group">
                            <label for="editCapacidadReferencial">Capacidad referencial</label>
                            <input id="editCapacidadReferencial" type="number" th:field="*{capacidadReferencial}">
                            <small class="field-error" th:if="${#fields.hasErrors('capacidadReferencial')}"
                                th:errors="*{capacidadReferencial}"></small>
                        </div>

                        <div class="form-group full-span">
                            <label for="editDescripcion">Descripción</label>
                            <input id="editDescripcion" type="text" th:field="*{descripcion}">
                            <small class="field-error" th:if="${#fields.hasErrors('descripcion')}"
                                th:errors="*{descripcion}"></small>
                        </div>

                        <div class="form-group">
                            <label for="editLoteId">Invernadero asociado</label>
                            <select id="editLoteId" th:field="*{loteId}">
                                <option value="">Seleccione un invernadero</option>
                                <option th:each="lote : ${lotes}" th:value="${lote.id}"
                                    th:text="${lote.codigo + ' - ' + lote.cultivo + ' / ' + lote.variedad}"></option>
                            </select>
                            <small class="field-error" th:if="${#fields.hasErrors('loteId')}"
                                th:errors="*{loteId}"></small>
                        </div>

                        <div class="form-group">
                            <label for="editEstado">Estado</label>
                            <select id="editEstado" th:field="*{estado}">
                                <option th:each="estado : ${estadosDisponibles}" th:value="${estado}"
                                    th:text="${estado}"></option>
                            </select>
                            <small class="field-error" th:if="${#fields.hasErrors('estado')}"
                                th:errors="*{estado}"></small>
                        </div>

                        <div class="lote-edit-actions full-span">
                            <button class="primary-btn full-width" type="submit">Actualizar cama</button>
                            <a class="ghost-btn full-width" th:href="@{/camas}">Cancelar</a>
                        </div>
                    </form>
                </article>
            </section>
        </main>
    </div>
</body>

</html>
