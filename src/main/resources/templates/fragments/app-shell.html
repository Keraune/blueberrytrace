<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar blueberry-sidebar" th:fragment="sidebar(activePage)">
    <a class="brand-block" th:href="@{/dashboard}" aria-label="Ir al dashboard de BlueberryTrace">
        <span class="brand-orb" aria-hidden="true"></span>
        <div>
            <h2>BlueberryTrace</h2>
            <p>AGRO INTELLIGENCE</p>
        </div>
    </a>

    <nav class="sidebar-nav" data-module-nav>
        <div class="sidebar-section-title">Principal</div>
        <a data-module-item th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
            <span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M4 4h7v7H4zm9 0h7v7h-7zM4 13h7v7H4zm9 0h7v7h-7z"/></svg></span>
            <span>Dashboard</span>
        </a>
        <a data-module-item th:href="@{/usuarios}" th:classappend="${activePage == 'usuarios'} ? 'active' : ''">
            <span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3s-3 1.34-3 3s1.34 3 3 3M8 11c1.66 0 3-1.34 3-3S9.66 5 8 5S5 6.34 5 8s1.34 3 3 3m0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13m8 0c-.29 0-.62.02-.97.05c1.16.84 1.97 1.98 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5"/></svg></span>
            <span>Usuarios</span>
        </a>
        <a data-module-item th:href="@{/lotes}" th:classappend="${activePage == 'lotes'} ? 'active' : ''">
            <span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2 2 7l10 5l10-5zm0 7.75L6.47 7L12 4.24L17.53 7zM2 17l10 5l10-5v-2l-10 5l-10-5zm0-5l10 5l10-5v-2l-10 5l-10-5z"/></svg></span>
            <span>Lotes e Invernaderos</span>
        </a>

        <div class="sidebar-section-title">Proceso productivo</div>
        <a data-module-item th:href="@{/siembra}" th:classappend="${activePage == 'siembra'} ? 'active' : ''">
            <span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M7.5 21c-.5-4.4.8-7.9 3.8-10.7C8.9 10.5 6.6 9.7 5 8c2.8-.5 5 .1 6.7 1.7C11.8 6.2 13.8 3.4 18 2c.2 4.3-1.2 7.6-4.3 9.8c3.2.7 5.4 2.6 6.3 5.7c-3.8-.3-6.5-1.7-8-4.3c-1.9 2.1-2.8 4.7-2.5 7.8z"/></svg></span>
            <span>Registro de Siembra</span>
        </a>
        <a data-module-item th:href="@{/procesos}" th:classappend="${activePage == 'procesos'} ? 'active' : ''">
            <span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 2h12v6H6zm2 2v2h8V4zm-2 8h12v10H6zm2 2v6h8v-6zm-6-5h20v2H2z"/></svg></span>
            <span>Uniformización</span>
        </a>
        <a data-module-item th:href="@{/clasificacion}" th:classappend="${activePage == 'clasificacion'} ? 'active' : ''">
            <span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M20.59 13.41 11 3.83V2H3v8h1.83l9.58 9.59a2 2 0 0 0 2.83 0l3.35-3.35a2 2 0 0 0 0-2.83M7 7H5V5h2z"/></svg></span>
            <span>Clasificación</span>
        </a>
        <a data-module-item th:href="@{/despacho}" th:classappend="${activePage == 'despacho'} ? 'active' : ''">
            <span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M20 8h-3V4H3v13h2a3 3 0 0 0 6 0h4a3 3 0 0 0 6 0h2v-5zM8 18.5A1.5 1.5 0 1 1 8 15a1.5 1.5 0 0 1 0 3.5m10 0a1.5 1.5 0 1 1 0-3.5a1.5 1.5 0 0 1 0 3.5M17 10h2.74L21 12.5V13h-4z"/></svg></span>
            <span>Despacho</span>
        </a>

        <div class="sidebar-section-title">Análisis</div>
        <a data-module-item th:href="@{/reportes}" th:classappend="${activePage == 'reportes'} ? 'active' : ''">
            <span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M5 9.2h3V19H5zm5.5-4.2h3v14h-3zM16 12h3v7h-3zM4 20h17v2H4z"/></svg></span>
            <span>Reportes</span>
        </a>
        <a data-module-item th:href="@{/cuenta/ajustes}" th:classappend="${activePage == 'cuenta'} ? 'active' : ''">
            <span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 12a5 5 0 1 0-5-5a5 5 0 0 0 5 5m0 2c-4.42 0-8 1.79-8 4v2h16v-2c0-2.21-3.58-4-8-4"/></svg></span>
            <span>Mi cuenta</span>
        </a>
    </nav>

    <div class="sidebar-account" data-account-menu>
        <button class="sidebar-user sidebar-user-button" type="button" data-account-toggle>
            <div class="avatar-mini">CM</div>
            <div>
                <strong>Carlos Mendoza</strong>
                <small>Administrador</small>
            </div>
            <span class="account-chevron">▾</span>
        </button>
        <div class="account-dropdown" data-account-dropdown>
            <a th:href="@{/cuenta/ajustes}">Ajustes de la cuenta</a>
            <a th:href="@{/admin/gestion}">Gestión administrador</a>
        </div>
    </div>
    <form class="sidebar-logout-form" th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">
            <span aria-hidden="true">↳</span>
            Cerrar sesión
        </button>
    </form>
</aside>

<div class="topbar-stack" th:fragment="topbar(title, subtitle)">
    <header class="topbar blueberry-topbar">
        <div class="topbar-breadcrumb" aria-label="Ubicación actual">
            <span class="breadcrumb-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M17.75 3.5c-4.7.1-8.2 1.8-10.4 5.2c-1.7 2.6-2.2 5.5-1.8 8.7c3.2.4 6.1-.2 8.7-1.8c3.4-2.2 5.1-5.7 5.2-10.4V3.5zM8.7 15.3c-.1-2.1.3-3.9 1.4-5.5c1.4-2.2 3.5-3.5 6.4-3.9c-.4 2.9-1.7 5-3.9 6.4c-1.6 1.1-3.4 1.5-5.5 1.4z"/></svg>
            </span>
            <span>›</span>
            <strong th:text="${title}">Dashboard</strong>
        </div>
        <div class="topbar-actions">
            <label class="global-search" aria-label="Búsqueda rápida">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M9.5 3a6.5 6.5 0 0 1 5.18 10.43l4.44 4.44l-1.41 1.41l-4.44-4.44A6.5 6.5 0 1 1 9.5 3m0 2a4.5 4.5 0 1 0 0 9a4.5 4.5 0 0 0 0-9"/></svg>
                <input type="search" placeholder="Buscar en el sistema..." data-module-search>
            </label>
            <button class="topbar-icon-button" type="button" aria-label="Notificaciones">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22m7-6v-5c0-3.1-1.64-5.64-4.5-6.32V4a2.5 2.5 0 0 0-5 0v.68C6.63 5.36 5 7.89 5 11v5l-2 2v1h18v-1z"/></svg>
                <span></span>
            </button>
            <a class="topbar-avatar" th:href="@{/cuenta/ajustes}" aria-label="Abrir ajustes de cuenta">CM</a>
        </div>
    </header>
    <section class="page-heading">
        <div>
            <h1 th:text="${title}">Dashboard</h1>
            <p th:text="${subtitle}">Sistema interno del área de arándanos.</p>
        </div>
    </section>
</div>
</body>
</html>
