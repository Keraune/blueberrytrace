<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar" th:fragment="sidebar(activePage)">
    <div class="brand-block">
        <div class="brand-badge">VLV</div>
        <div><h2>Blueberry System</h2><p>Panel interno</p></div>
    </div>

    <div class="sidebar-search">
        <span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M9.5 3a6.5 6.5 0 0 1 5.18 10.43l4.44 4.44l-1.41 1.41l-4.44-4.44A6.5 6.5 0 1 1 9.5 3m0 2a4.5 4.5 0 1 0 0 9a4.5 4.5 0 0 0 0-9"/></svg></span>
        <input type="text" placeholder="Buscar módulo...">
    </div>

    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard'} ? 'active' : ''"><span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M3 13h8V3H3zm0 8h8v-6H3zm10 0h8V11h-8zm0-18v6h8V3z"/></svg></span><span>Dashboard</span></a>
        <a th:href="@{/usuarios}" th:classappend="${activePage == 'usuarios'} ? 'active' : ''"><span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3s1.34 3 3 3m-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5S5 6.34 5 8s1.34 3 3 3m0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13m8 0c-.29 0-.62.02-.97.05c1.16.84 1.97 1.98 1.97 3.45V19h7v-2.5c0-2.33-4.67-3.5-7-3.5"/></svg></span><span>Usuarios</span></a>
        <a th:href="@{/lotes}" th:classappend="${activePage == 'lotes'} ? 'active' : ''"><span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2c3.87 0 7 3.13 7 7c0 5.25-7 13-7 13S5 14.25 5 9c0-3.87 3.13-7 7-7m0 9.5A2.5 2.5 0 1 0 12 6.5a2.5 2.5 0 0 0 0 5"/></svg></span><span>Lotes</span></a>
        <a th:href="@{/camas}" th:classappend="${activePage == 'camas'} ? 'active' : ''"><span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M3 3h8v8H3zm10 0h8v8h-8zM3 13h8v8H3zm10 0h8v8h-8z"/></svg></span><span>Camas</span></a>
        <a th:href="@{/siembra}" th:classappend="${activePage == 'siembra'} ? 'active' : ''"><span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 22c-4.97 0-9-4.03-9-9c0-2.76 1.25-5.24 3.22-6.89c1.24 3.54 4.6 6.05 8.56 6.05c1.56 0 3.03-.39 4.31-1.08C20.28 15.56 16.54 22 12 22"/></svg></span><span>Siembra y ubicación</span></a>
        <a th:href="@{/procesos}" th:classappend="${activePage == 'procesos'} ? 'active' : ''"><span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="m19.14 12.94l.04-.32l.82-.64a.5.5 0 0 0 .12-.63l-.78-1.35a.5.5 0 0 0-.6-.22l-.96.39l-.25-.17l-.14-.29l-.15-.9a.5.5 0 0 0-.49-.41h-1.56a.5.5 0 0 0-.49.41l-.15.9l-.14.29l-.25.17l-.96-.39a.5.5 0 0 0-.6.22l-.78 1.35a.5.5 0 0 0 .12.63l.82.64l.04.32l-.04.32l-.82.64a.5.5 0 0 0-.12.63l.78 1.35c.13.22.39.31.6.22l.96-.39l.25.17l.14.29l.15.9c.04.24.25.41.49.41h1.56c.24 0 .45-.17.49-.41l.15-.9l.14-.29l.25-.17l.96.39c.21.09.47 0 .6-.22l.78-1.35a.5.5 0 0 0-.12-.63l-.82-.64zM16 12a2 2 0 1 1-4 0a2 2 0 0 1 4 0"/></svg></span><span>Procesos</span></a>
        <a th:href="@{/clasificacion}" th:classappend="${activePage == 'clasificacion'} ? 'active' : ''"><span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M3 17h6v2H3zm0-6h12v2H3zm0-6h18v2H3z"/></svg></span><span>Clasificación</span></a>
        <a th:href="@{/despacho}" th:classappend="${activePage == 'despacho'} ? 'active' : ''"><span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M20 8h-3V4H1v13h2a3 3 0 0 0 6 0h6a3 3 0 0 0 6 0h2v-5zM6 18.5A1.5 1.5 0 1 1 6 15a1.5 1.5 0 0 1 0 3.5m12 0a1.5 1.5 0 1 1 0-3.5a1.5 1.5 0 0 1 0 3.5M17 10h2.74L21 12.5V13h-4z"/></svg></span><span>Despacho</span></a>
        <a th:href="@{/reportes}" th:classappend="${activePage == 'reportes'} ? 'active' : ''"><span class="nav-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M3 3h18v2H3zm2 4h4v10H5zm5 3h4v7h-4zm5-5h4v12h-4zM3 19h18v2H3z"/></svg></span><span>Reportes</span></a>
    </nav>

    <div class="sidebar-user">
        <div class="avatar-mini">K</div>
        <div><strong>Keraune</strong><small>Administrador</small></div>
    </div>
</aside>

<header class="topbar" th:fragment="topbar(title, subtitle)">
    <div><h1 th:text="${title}">Dashboard</h1><p th:text="${subtitle}">Sistema interno</p></div>
    <div class="topbar-actions">
        <a class="ghost-btn" th:href="@{/auth/login}"><span class="action-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M10 17v-3H3v-4h7V7l5 5zM20 3H12v2h8v14h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2"/></svg></span><span>Login</span></a>
        <a class="primary-btn" th:href="@{/auth/register}"><span class="action-svg"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M15 14c2.67 0 8 1.34 8 4v2H7v-2c0-2.66 5.33-4 8-4m0-2a4 4 0 1 1 0-8a4 4 0 0 1 0 8M5 8V5H3V3h2V0h2v3h2v2H7v3z"/></svg></span><span>Nuevo usuario</span></a>
    </div>
</header>
</body></html>
