<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BlueberryTrace, sistema interno de control, clasificación y trazabilidad de plantas de arándano para Vivero Los Viñedos.">
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <title th:text="${title}">BlueberryTrace</title>

    <!-- Fase 1: Tailwind Play CDN solo para desarrollo académico y prototipado rápido. -->
    <script src="/js/tailwind.config.js" th:src="@{/js/tailwind.config.js}"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>

<body>
<th:block th:fragment="scripts">
    <!-- Fase 1: HTMX queda disponible para vistas parciales, filtros y formularios en fases posteriores. -->
    <script src="https://unpkg.com/htmx.org@2.0.10"></script>
    <script src="/js/app.js" th:src="@{/js/app.js}"></script>
</th:block>
</body>

</html>
