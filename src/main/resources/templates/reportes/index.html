<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes</title>
    <link rel="stylesheet" href="../../static/css/style.css" th:href="@{/css/style.css}">
</head>

<body class="app-body">
    <div class="app-shell">
        <div th:replace="~{fragments/app-shell :: sidebar('reportes')}"></div>
        <main class="main-content">
            <div
                th:replace="~{fragments/app-shell :: topbar('Reportes', 'Vista preliminar para exportaciones futuras en Excel y PDF')}">
            </div>
            <section class="stats-grid">
                <article class="stat-card"><span>Reporte por lote</span><strong>Disponible</strong><small>Vista
                        preliminar</small></article>
                <article class="stat-card"><span>Reporte por fecha</span><strong>Disponible</strong><small>Vista
                        preliminar</small></article>
                <article class="stat-card"><span>Clasificación</span><strong>Disponible</strong><small>Vista
                        preliminar</small></article>
                <article class="stat-card"><span>Despacho</span><strong>Disponible</strong><small>Vista
                        preliminar</small></article>
            </section>
            <section class="panel-card">
                <div class="panel-head">
                    <h3>Filtros visuales</h3><span>Frontend</span>
                </div>
                <form class="form-grid three-columns">
                    <div class="form-group"><label>Desde</label><input type="date"></div>
                    <div class="form-group"><label>Hasta</label><input type="date"></div>
                    <div class="form-group"><label>Tipo de reporte</label><select>
                            <option>Por lote</option>
                            <option>Por fecha</option>
                            <option>Clasificación</option>
                            <option>Despacho</option>
                        </select></div><button class="primary-btn full-width full-span" type="button">Generar
                        reporte</button>
                </form>
            </section>
        </main>
    </div>
    <script src="../../static/js/app.js" th:src="@{/js/app.js}"></script>
</body>

</html>
