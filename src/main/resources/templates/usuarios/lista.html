<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>
    <link rel="stylesheet" href="../../static/css/style.css" th:href="@{/css/style.css}">
</head>
<body class="app-body">
<div class="app-shell">
    <div th:replace="~{fragments/app-shell :: sidebar('usuarios')}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/app-shell :: topbar('Usuarios y roles', 'Administración de accesos del sistema')}"></div>
        <section class="panel-card">
            <div class="panel-head"><h3>Usuarios registrados</h3><a class="primary-btn" th:href="@{/auth/register}">Nuevo usuario</a></div>
            <div class="table-responsive">
                <table class="custom-table">
                    <thead><tr><th>Nombre</th><th>Usuario</th><th>Email</th><th>Rol</th><th>Estado</th></tr></thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(usuarios)}"><td colspan="5">No hay usuarios registrados.</td></tr>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.nombreCompleto}">Administrador</td>
                        <td th:text="${usuario.username}">admin</td>
                        <td th:text="${usuario.email ?: 'No registrado'}">admin@vlv.local</td>
                        <td th:text="${usuario.rol != null ? usuario.rol.nombre : '-'}">ADMINISTRADOR</td>
                        <td><span class="badge" th:classappend="${usuario.estado} ? ' success' : ' neutral'" th:text="${usuario.estado ? 'ACTIVO' : 'INACTIVO'}">ACTIVO</span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<script src="../../static/js/app.js" th:src="@{/js/app.js}"></script>
</body>
</html>
